<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>This Is Pravin</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header class="topbar">

    <div class="brand">

      <div class="logo">
        P/
      </div>

      <div class="chapter">
        01
      </div>

    </div>

    <div class="status">
      <span class="label">CURRENTLY</span>
      <span class="city">PARIS, FR</span>
      <span class="clock" id="clock">00:00</span>
    </div>

  </header>

  <section class="hero">

    <img
      src="assets/eiffel.jpg"
      class="hero-image"
      id="heroImage"
      alt="Pravin in Paris">

    <div id="portal"></div>

    <div class="hero-content">

      <h1>
        Somewhere<br>
        between<br>
        almosts<br>
        and what ifs.
      </h1>

      <p>
        Kolkata. Paris. Somewhere ahead.
      </p>

    </div>

    <div class="scroll-indicator">
      SCROLL TO CONTINUE
    </div>

    <div class="section-progress">
      01 / 04
    </div>

  </section>

  <script src="script.js"></script>

</body>

</html>
